[package]
name = "gem_jsonrpc"
version = { workspace = true }
edition = { workspace = true }

[features]
default = ["types"]
types = []
client = ["dep:gem_client", "dep:async-trait", "dep:primitives", "dep:hex"]
reqwest = ["client", "gem_client/reqwest"]
testkit = ["client", "gem_client/testkit"]

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }

gem_client = { path = "../gem_client", optional = true }
async-trait = { workspace = true, optional = true }
primitives = { path = "../primitives", optional = true }
hex = { workspace = true, optional = true }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
