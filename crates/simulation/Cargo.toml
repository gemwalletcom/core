[package]
name = "simulation"
version = { workspace = true }
edition = { workspace = true }

[features]
default = []
rpc = ["gem_evm/rpc", "dep:gem_client"]

[dependencies]
primitives = { path = "../primitives" }
gem_evm = { path = "../gem_evm" }
gem_client = { path = "../gem_client", optional = true }

alloy-sol-types = { workspace = true }
num-bigint = { workspace = true }
num-traits = { workspace = true }
strum = { workspace = true }

[dev-dependencies]
alloy-primitives = { workspace = true }
primitives = { path = "../primitives", features = ["testkit"] }
gem_client = { path = "../gem_client", features = ["testkit"] }
gem_jsonrpc = { path = "../gem_jsonrpc", features = ["testkit"] }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
